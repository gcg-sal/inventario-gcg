  :root {

    --text: #1A1A2E; --muted: #7A7060; --green: #2D7A4F; --red: #8B1A1A;
    --purple: #5B3FA6;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .header-top { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 2px solid var(--gold); }
  .header-brand .co { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; color: var(--gold); letter-spacing: .05em; }
  .header-brand .sub { font-size: 10px; color: rgba(255,255,255,.6); letter-spacing: .12em; text-transform: uppercase; }
  .header-date { text-align: right; font-size: 11px; color: rgba(255,255,255,.7); }
  .header-date strong { display: block; color: var(--gold-light); font-size: 13px; }

  /* PROGRESS */
  .progress-wrap { padding: 8px 20px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,.2); }
  .progress-bar-bg { flex: 1; height: 6px; background: rgba(255,255,255,.15); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 3px; transition: width .4s; width: 0%; }
  .progress-label { font-size: 11px; color: rgba(255,255,255,.7); white-space: nowrap; min-width: 70px; text-align: right; }

  /* NAV */
  .section-nav { display: flex; overflow-x: auto; background: var(--teal); scrollbar-width: none; border-bottom: 1px solid rgba(255,255,255,.1); }
  .section-nav::-webkit-scrollbar { display: none; }
  .nav-tab { padding: 9px 14px; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; color: rgba(255,255,255,.6); border: none; background: none; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; letter-spacing: .08em; text-transform: uppercase; transition: all .2s; }
  .nav-tab.active { color: var(--gold-light); border-bottom-color: var(--gold); }
  .nav-tab.consolidado-tab { color: rgba(200,180,255,.7); }
  .nav-tab.consolidado-tab.active { color: #C8B4FF; border-bottom-color: var(--purple); }
  .nav-tab .badge { display: inline-block; background: var(--gold); color: var(--navy); border-radius: 10px; font-size: 9px; padding: 1px 5px; margin-left: 4px; font-weight: 600; vertical-align: middle; }
  .nav-tab.done .badge { background: var(--green); color: white; }
  .nav-tab.consolidado-tab .badge { background: var(--purple); color: white; }

  /* MAIN */
  main { padding-bottom: 120px; }
  .section-panel { display: none; padding: 16px; }
  .section-panel.active { display: block; }

  /* SECTION HEADER */
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid var(--gold); flex-wrap: wrap; }
  .section-icon { width: 36px; height: 36px; background: var(--navy); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .section-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 16px; color: var(--navy); }
  .section-count { margin-left: auto; font-size: 11px; color: var(--muted); background: var(--border); padding: 2px 8px; border-radius: 10px; }

  /* TABLE */
  .inv-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,.08); margin-bottom: 12px; }
  .inv-table thead th { background: var(--navy); color: rgba(255,255,255,.7); font-size: 9px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; padding: 8px 10px; text-align: left; }
  .inv-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
  .inv-table tbody tr:last-child { border-bottom: none; }
  .inv-table tbody tr:hover { background: #F0EDE5; }
  .inv-table tbody tr.filled { background: #EDF7F1; }
  .inv-table tbody tr.filled:hover { background: #E0F2E8; }
  .inv-table tbody tr.manual-row { background: #FFF9ED; }
  .inv-table tbody tr.manual-row.filled { background: #EDFFF4; }
  .col-num { padding: 10px 8px 10px 12px; font-size: 10px; color: var(--border); width: 28px; text-align: right; }
  .col-codigo { padding: 10px; font-size: 10px; color: var(--muted); white-space: nowrap; width: 105px; }
  .col-producto { padding: 10px 8px; font-size: 12px; font-weight: 500; color: var(--text); }
  .col-udm { padding: 10px 6px; font-size: 10px; color: var(--teal); font-weight: 600; width: 40px; text-align: center; }
  .col-cantidad { padding: 6px 8px; width: 105px; }
  .col-del { padding: 6px 8px; width: 36px; text-align: center; }

  .qty-input { width: 100%; padding: 7px 8px; border: 2px solid var(--border); border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; text-align: right; background: white; color: var(--text); transition: border-color .2s, background .2s; -webkit-appearance: none; }
  .qty-input:focus { outline: none; border-color: var(--gold); background: #FFFDF5; }
  .qty-input.has-value { border-color: var(--green); background: #F0FFF7; color: var(--green); }

  /* ADD ROW BUTTON */
  .btn-add-row { display: flex; align-items: center; gap: 8px; width: 100%; padding: 12px 16px; background: white; border: 2px dashed var(--gold); border-radius: 10px; color: var(--gold); font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .2s; margin-top: 8px; }
  .btn-add-row:hover { background: #FFFDF5; border-color: var(--gold-light); }
  .btn-add-row .plus { font-size: 20px; font-weight: 300; line-height: 1; }

  /* DELETE ROW BUTTON */
  .btn-del-row { background: none; border: none; color: #CCC; font-size: 16px; cursor: pointer; padding: 4px; border-radius: 4px; transition: color .2s; }
  .btn-del-row:hover { color: var(--red); }

  /* MODAL - Add product */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 500; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .25s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 24px 20px 40px; width: 100%; transform: translateY(100%); transition: transform .3s ease; }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 17px; color: var(--navy); margin-bottom: 6px; }
  .modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .modal-field input, .modal-field select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 14px; background: white; color: var(--text); }
  .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--gold); }
  .modal-row { display: flex; gap: 10px; }
  .modal-row .modal-field { flex: 1; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-modal-cancel { flex: 1; padding: 14px; background: var(--border); border: none; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; color: var(--text); }
  .btn-modal-add { flex: 2; padding: 14px; background: var(--navy); border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; cursor: pointer; color: var(--gold); letter-spacing: .05em; }

  /* CONSOLIDADO */
  .consolidado-header { border-bottom-color: var(--purple) !important; }
  .consolidado-icon { background: var(--purple) !important; }
  .consolidado-title { color: var(--purple) !important; }
  .cons-table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 8px rgba(0,0,0,.08); }
  .cons-table thead th { background: var(--purple); color: rgba(255,255,255,.85); font-size: 9px; font-weight: 500; letter-spacing: .12em; text-transform: uppercase; padding: 8px 10px; text-align: left; }
  .cons-table tbody tr { border-bottom: 1px solid var(--border); }
  .cons-table tbody tr:last-child { border-bottom: none; }
  .cons-table tbody tr:hover { background: #F5F0FF; }
  .cons-table tbody tr.multi { background: #FAF5FF; }
  .cons-table td { padding: 9px 10px; font-size: 12px; }
  .cons-codigo { font-size: 10px; color: var(--muted); width: 105px; }
  .cons-producto { font-weight: 500; }
  .cons-bodegas { font-size: 10px; color: var(--muted); }

  .cons-total { font-weight: 600; color: var(--purple); text-align: right; font-size: 14px; white-space: nowrap; }
  .cons-udm { font-size: 10px; color: var(--teal); font-weight: 600; width: 40px; text-align: center; }

  .btn-cons-export { padding: 10px 14px; background: var(--purple); color: white; border: none; border-radius: 8px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; cursor: pointer; white-space: nowrap; }

  .btn-export { flex: 1; background: var(--gold); color: var(--navy); border: none; border-radius: 10px; padding: 14px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; letter-spacing: .05em; cursor: pointer; transition: all .2s; text-transform: uppercase; }
  .btn-export:hover { background: var(--gold-light); }
  .btn-clear { background: rgba(255,255,255,.1); color: rgba(255,255,255,.7); border: 1px solid rgba(255,255,255,.2); border-radius: 10px; padding: 14px 16px; font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
  .footer-stats { text-align: center; font-size: 10px; color: rgba(255,255,255,.5); line-height: 1.3; }
  .footer-stats strong { color: var(--gold-light); font-size: 12px; display: block; }

  /* TOAST */
  .toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: var(--green); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; pointer-events: none; transition: all .3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MANUAL badge */
  .manual-tag { font-size: 8px; background: #FFF3CD; color: #856404; border-radius: 3px; padding: 1px 4px; margin-left: 4px; vertical-align: middle; border: 1px solid #FFEAA7; }
</style>
</head>

<header>

      <span class="sub">Inventario Físico — Producción</span>
    </div>
    <div class="header-date">
      <strong id="fechaHoy"></strong>

    </div>
  </div>

</header>

<main id="mainContent"></main>

<footer>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">

      <input type="text" id="mCodigo" placeholder="Ej: 1100001234" inputmode="numeric">
    </div>
    <div class="modal-field">
      <label>Nombre del Producto *</label>
      <input type="text" id="mProducto" placeholder="Ej: Aceite de Oliva Extra Virgen">
    </div>
    <div class="modal-row">
      <div class="modal-field">
        <label>Cantidad</label>
        <input type="number" id="mCantidad" placeholder="0" inputmode="decimal" min="0" step="any">
      </div>
      <div class="modal-field">
        <label>Unidad</label>
        <select id="mUDM">
          <option value="KG">KG</option>
          <option value="UN">UN</option>
          <option value="L">L</option>
          <option value="0">—</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-add" onclick="confirmarAgregarProducto()">AGREGAR</button>
    </div>
  </div>
</div>

// ──────────────────────────────────────────────
//  STATE
// ──────────────────────────────────────────────
let activeSection = 0;
const quantities = {};
const manualItems = {};

// Ordenar artículos alfabéticamente en todas las secciones
SECTIONS.forEach(s => {
  s.items.sort((a, b) => a[1].localeCompare(b[1], 'es', {sensitivity: 'base'}));
  quantities[s.id] = {};
  manualItems[s.id] = [];
});

let modalTargetSection = null;
const LS_KEY = 'gcg_inventario_v3';

// ──────────────────────────────────────────────
//  LOCALSTORAGE — guardar y restaurar
// ──────────────────────────────────────────────
function guardarEstado() {
  try {
    const estado = { quantities: {}, manualItems: {} };
    SECTIONS.forEach(s => {
      estado.quantities[s.id] = quantities[s.id];
      estado.manualItems[s.id] = manualItems[s.id];
    });
    localStorage.setItem(LS_KEY, JSON.stringify(estado));
  } catch(e) {}
}

function restaurarEstado() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const estado = JSON.parse(raw);
    // Restaurar cantidades preset
    SECTIONS.forEach(s => {
      if (estado.quantities && estado.quantities[s.id]) {
        Object.assign(quantities[s.id], estado.quantities[s.id]);
      }
      // Restaurar artículos manuales
      if (estado.manualItems && estado.manualItems[s.id]) {
        manualItems[s.id] = estado.manualItems[s.id];
      }
    });
  } catch(e) {}
}

// ──────────────────────────────────────────────
//  INIT
// ──────────────────────────────────────────────
function init() {
  const now = new Date();
  document.getElementById('fechaHoy').textContent =
    now.toLocaleDateString('es-SV', {day:'2-digit', month:'long', year:'numeric'});
  restaurarEstado();
  buildNav();
  buildPanels();
  activateSection(0);
  restoreUI();
  updateProgress();
}

function restoreUI() {
  SECTIONS.forEach(sec => {
    // Restore preset quantities
    sec.items.forEach((item, ri) => {
      const val = quantities[sec.id][ri];
      if (val !== undefined) {
        const input = document.getElementById(`qty-${sec.id}-${ri}`);
        const row = document.getElementById(`row-${sec.id}-${ri}`);
        if (input) { input.value = val; input.classList.add('has-value'); }
        if (row) row.classList.add('filled');
      }
    });
    // Restore manual rows
    if (manualItems[sec.id].length > 0) {
      const tbody = document.getElementById(`tbody-${sec.id}`);
      manualItems[sec.id].forEach((mItem, mi) => {
        const rowNum = sec.items.length + mi + 1;
        const rowHTML = buildManualRow(sec.id, mItem, rowNum);
        tbody.insertAdjacentHTML('beforeend', rowHTML);
        // Restore its quantity
        const val = quantities[sec.id][mItem.key];
        if (val !== undefined) {
          const input = document.getElementById(`qty-${sec.id}-${mItem.key}`);
          const row = document.getElementById(`row-${sec.id}-${mItem.key}`);
          if (input) { input.value = val; input.classList.add('has-value'); }
          if (row) { row.classList.add('filled'); row.classList.add('manual-row'); }
        }
      });
      updateSectionCount(sec.id);
    }
  });
}

// ──────────────────────────────────────────────
//  NAV
// ──────────────────────────────────────────────
function buildNav() {
  const nav = document.getElementById('sectionNav');
  SECTIONS.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-tab';
    btn.dataset.idx = i;
    btn.innerHTML = `${sec.icono} ${sec.nombre} <span class="badge" id="badge-${sec.id}">0</span>`;
    btn.onclick = () => activateSection(i);
    nav.appendChild(btn);
  });
  // Consolidado tab
  const cons = document.createElement('button');
  cons.className = 'nav-tab consolidado-tab';
  cons.innerHTML = `📊 Consolidado <span class="badge" id="badge-consolidado">0</span>`;
  cons.onclick = () => activateConsolidado();
  nav.appendChild(cons);
}

// ──────────────────────────────────────────────
//  PANELS
// ──────────────────────────────────────────────
function buildPanels() {
  const main = document.getElementById('mainContent');
  SECTIONS.forEach((sec, si) => {
    const div = document.createElement('div');
    div.className = 'section-panel';
    div.id = `panel-${sec.id}`;

    let tableHTML = '';
    if (sec.items.length > 0) {
      let rows = sec.items.map((item, ri) => buildPresetRow(sec.id, ri, item)).join('');
      tableHTML = `
        <table class="inv-table" id="table-${sec.id}">
          <thead><tr>
            <th>#</th><th>Código SAP</th><th>Producto</th><th>UDM</th>
            <th style="text-align:right">Cantidad</th><th></th>
          </tr></thead>
          <tbody id="tbody-${sec.id}">${rows}</tbody>
        </table>`;
    } else {
      tableHTML = `
        <table class="inv-table" id="table-${sec.id}">
          <thead><tr>
            <th>#</th><th>Código SAP</th><th>Producto</th><th>UDM</th>
            <th style="text-align:right">Cantidad</th><th></th>
          </tr></thead>
          <tbody id="tbody-${sec.id}"></tbody>
        </table>`;
    }

    div.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${sec.icono}</div>
        <div class="section-title">${sec.nombre}</div>
        <div class="section-count" id="count-${sec.id}">${sec.items.length} artículos</div>
      </div>
      ${tableHTML}
      <button class="btn-add-row" onclick="openModal('${sec.id}')">
        <span class="plus">＋</span> Agregar producto no listado
      </button>`;
    main.appendChild(div);
  });

  // Consolidado panel
  const cDiv = document.createElement('div');
  cDiv.className = 'section-panel';
  cDiv.id = 'panel-consolidado';
  cDiv.innerHTML = `
    <div class="section-header consolidado-header">
      <div class="section-icon consolidado-icon">📊</div>
      <div class="section-title consolidado-title">Consolidado General</div>
      <div class="section-count" id="count-consolidado">0 artículos</div>
    </div>
    <div class="cons-filter">
      <input type="text" id="consSearch" placeholder="🔍 Buscar artículo..." oninput="renderConsolidado()">
      <button class="btn-cons-export" onclick="exportarExcelConsolidado()">⬇ Excel</button>
    </div>
    <div id="consBody"></div>`;
  main.appendChild(cDiv);
}

function buildPresetRow(secId, ri, item) {
  return `<tr id="row-${secId}-${ri}">
    <td class="col-num">${ri+1}</td>
    <td class="col-codigo">${item[0]}</td>
    <td class="col-producto">${item[1]}</td>
    <td class="col-udm">${item[2]}</td>
    <td class="col-cantidad">
      <input type="number" inputmode="decimal" min="0" step="any"
        class="qty-input" id="qty-${secId}-${ri}" placeholder="—"
        onchange="handleQty('${secId}','${ri}',this.value)"
        oninput="handleQty('${secId}','${ri}',this.value)">
    </td>
    <td class="col-del"></td>
  </tr>`;
}

function buildManualRow(secId, mItem, rowNum) {
  return `<tr id="row-${secId}-${mItem.key}" class="manual-row">
    <td class="col-num">${rowNum}<span class="manual-tag">+</span></td>
    <td class="col-codigo">${mItem.codigo || '—'}</td>
    <td class="col-producto">${mItem.producto}</td>
    <td class="col-udm">${mItem.udm}</td>
    <td class="col-cantidad">
      <input type="number" inputmode="decimal" min="0" step="any"
        class="qty-input" id="qty-${secId}-${mItem.key}" placeholder="—"
        onchange="handleQty('${secId}','${mItem.key}',this.value)"
        oninput="handleQty('${secId}','${mItem.key}',this.value)">
    </td>
    <td class="col-del">
      <button class="btn-del-row" onclick="eliminarManual('${secId}','${mItem.key}')" title="Eliminar">✕</button>
    </td>
  </tr>`;
}

// ──────────────────────────────────────────────
//  ACTIVATE
// ──────────────────────────────────────────────
function activateSection(idx) {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  const sec = SECTIONS[idx];
  document.getElementById(`panel-${sec.id}`).classList.add('active');
  document.querySelectorAll('.nav-tab')[idx].classList.add('active');
  activeSection = idx;
  document.querySelectorAll('.nav-tab')[idx].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
}

function activateConsolidado() {
  document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-consolidado').classList.add('active');
  const tabs = document.querySelectorAll('.nav-tab');
  tabs[tabs.length - 1].classList.add('active');
  tabs[tabs.length - 1].scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  activeSection = -1;
  renderConsolidado();
}

// ──────────────────────────────────────────────
//  QUANTITIES
// ──────────────────────────────────────────────
function handleQty(secId, rowKey, val) {
  const input = document.getElementById(`qty-${secId}-${rowKey}`);
  const row = document.getElementById(`row-${secId}-${rowKey}`);
  if (val !== '' && !isNaN(parseFloat(val))) {
    quantities[secId][rowKey] = val;
    input.classList.add('has-value');
    row.classList.add('filled');
  } else {
    delete quantities[secId][rowKey];
    input.classList.remove('has-value');
    row.classList.remove('filled');
  }
  updateProgress();
  guardarEstado();
}

// ──────────────────────────────────────────────
//  MODAL - ADD PRODUCT
// ──────────────────────────────────────────────
function openModal(secId) {
  modalTargetSection = secId;
  const sec = SECTIONS.find(s => s.id === secId);
  document.getElementById('modalSubtitle').textContent = `Agregar a: ${sec.icono} ${sec.nombre}`;
  document.getElementById('mCodigo').value = '';
  document.getElementById('mProducto').value = '';
  document.getElementById('mCantidad').value = '';
  document.getElementById('mUDM').value = 'KG';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('mProducto').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

function confirmarAgregarProducto() {
  const producto = document.getElementById('mProducto').value.trim();
  if (!producto) { alert('Ingresá el nombre del producto.'); return; }
  const codigo = document.getElementById('mCodigo').value.trim() || '—';
  const cantidad = document.getElementById('mCantidad').value.trim();
  const udm = document.getElementById('mUDM').value;
  const key = 'm-' + Date.now();

  const mItem = { key, codigo, producto, udm };
  manualItems[modalTargetSection].push(mItem);

  // Add row to table
  const tbody = document.getElementById(`tbody-${modalTargetSection}`);
  const totalRows = SECTIONS.find(s => s.id === modalTargetSection).items.length + manualItems[modalTargetSection].length;
  const rowHTML = buildManualRow(modalTargetSection, mItem, totalRows);
  tbody.insertAdjacentHTML('beforeend', rowHTML);

  // Set quantity if provided
  if (cantidad !== '' && !isNaN(parseFloat(cantidad))) {
    const input = document.getElementById(`qty-${modalTargetSection}-${key}`);
    input.value = cantidad;
    handleQty(modalTargetSection, key, cantidad);
  }

  // Update count
  updateSectionCount(modalTargetSection);
  guardarEstado();
  closeModal();
  showToast(`✓ "${producto}" agregado`);
}

function eliminarManual(secId, key) {
  if (!confirm('¿Eliminar este artículo?')) return;
  // Remove from manualItems
  manualItems[secId] = manualItems[secId].filter(m => m.key !== key);
  delete quantities[secId][key];
  // Remove row
  const row = document.getElementById(`row-${secId}-${key}`);
  if (row) row.remove();
  updateSectionCount(secId);
  updateProgress();
  guardarEstado();
  showToast('Artículo eliminado');
}

function updateSectionCount(secId) {
  const sec = SECTIONS.find(s => s.id === secId);
  const total = sec.items.length + manualItems[secId].length;
  const el = document.getElementById(`count-${secId}`);
  if (el) el.textContent = `${total} artículos`;
}

// ──────────────────────────────────────────────
//  CONSOLIDADO
// ──────────────────────────────────────────────
function buildConsolidadoData() {
  // Map: codigo+producto+udm -> {codigo, producto, udm, bodegas:[{nombre, qty}], total}
  const map = {};

  SECTIONS.forEach(sec => {
    // Preset items
    sec.items.forEach((item, ri) => {
      const qty = quantities[sec.id][ri];
      if (qty === undefined || qty === '') return;
      const qtyN = parseFloat(qty);
      if (isNaN(qtyN)) return;
      const key = `${item[0]}||${item[1]}||${item[2]}`;
      if (!map[key]) map[key] = {codigo: item[0], producto: item[1], udm: item[2], bodegas: [], total: 0};
      map[key].bodegas.push({nombre: sec.nombre, icono: sec.icono, qty: qtyN});
      map[key].total += qtyN;
    });
    // Manual items
    manualItems[sec.id].forEach(mItem => {
      const qty = quantities[sec.id][mItem.key];
      if (qty === undefined || qty === '') return;
      const qtyN = parseFloat(qty);
      if (isNaN(qtyN)) return;
      const key = `${mItem.codigo}||${mItem.producto}||${mItem.udm}`;
      if (!map[key]) map[key] = {codigo: mItem.codigo, producto: mItem.producto, udm: mItem.udm, bodegas: [], total: 0};
      map[key].bodegas.push({nombre: sec.nombre, icono: sec.icono, qty: qtyN});
      map[key].total += qtyN;
    });
  });

  return Object.values(map).sort((a,b) => a.producto.localeCompare(b.producto));
}

function renderConsolidado() {
  const data = buildConsolidadoData();
  const search = (document.getElementById('consSearch')?.value || '').toLowerCase();
  const filtered = search ? data.filter(d => d.producto.toLowerCase().includes(search) || d.codigo.toLowerCase().includes(search)) : data;

  document.getElementById('count-consolidado').textContent = `${filtered.length} artículos`;
  document.getElementById('badge-consolidado').textContent = data.length;

  const body = document.getElementById('consBody');
  if (filtered.length === 0) {
    body.innerHTML = `<div class="cons-empty"><div style="font-size:36px;margin-bottom:10px">📋</div><p>Aún no hay cantidades ingresadas.</p><p style="font-size:11px;margin-top:6px;color:var(--muted)">Las cantidades que ingreses en cada sección aparecerán aquí consolidadas.</p></div>`;
    return;
  }

  let rows = filtered.map((d, i) => {
    const isMulti = d.bodegas.length > 1;
    const bodegaHTML = d.bodegas.map(b =>
      `<span class="${isMulti ? 'multi-badge' : ''}">${b.icono} ${b.nombre}: ${b.qty % 1 === 0 ? b.qty : b.qty.toFixed(3)}</span>`
    ).join('');
    const totalStr = d.total % 1 === 0 ? d.total : d.total.toFixed(3);
    return `<tr class="${isMulti ? 'multi' : ''}">
      <td class="cons-codigo">${d.codigo}</td>
      <td class="cons-producto">${d.producto}${isMulti ? ' <span style="color:var(--purple);font-size:10px">●</span>' : ''}</td>
      <td class="cons-bodegas">${bodegaHTML}</td>
      <td class="cons-udm">${d.udm}</td>
      <td class="cons-total">${totalStr}</td>
    </tr>`;
  }).join('');

  body.innerHTML = `<table class="cons-table">
    <thead><tr>
      <th>Código SAP</th><th>Producto</th><th>Bodegas</th><th>UDM</th><th style="text-align:right">TOTAL</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <div style="text-align:right;font-size:10px;color:var(--muted);margin-top:8px">
    ● = artículo en múltiples bodegas
  </div>`;
}

// ──────────────────────────────────────────────
//  PROGRESS
// ──────────────────────────────────────────────
function updateProgress() {
  let total = 0, filled = 0;
  SECTIONS.forEach(sec => {
    const presetTotal = sec.items.length;
    const manualTotal = manualItems[sec.id].length;
    total += presetTotal + manualTotal;
    const f = Object.keys(quantities[sec.id]).length;
    filled += f;
    const badge = document.getElementById(`badge-${sec.id}`);
    if (badge) {
      badge.textContent = `${f}/${presetTotal + manualTotal}`;
      const tab = badge.closest('.nav-tab');
      if (f > 0 && f === presetTotal + manualTotal) tab.classList.add('done');
      else tab.classList.remove('done');
    }
  });
  const pct = total > 0 ? (filled / total * 100).toFixed(1) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${filled} / ${total}`;
  document.getElementById('footerFilled').textContent = filled;
}

// ──────────────────────────────────────────────
//  LIMPIAR
// ──────────────────────────────────────────────
function limpiarSeccion() {
  if (activeSection < 0) return;
  const sec = SECTIONS[activeSection];
  if (!confirm(`¿Limpiar todos los campos de "${sec.nombre}"?`)) return;
  quantities[sec.id] = {};
  sec.items.forEach((_, ri) => {
    const input = document.getElementById(`qty-${sec.id}-${ri}`);
    const row = document.getElementById(`row-${sec.id}-${ri}`);
    if (input) { input.value = ''; input.classList.remove('has-value'); }
    if (row) row.classList.remove('filled');
  });
  manualItems[sec.id].forEach(m => {
    const input = document.getElementById(`qty-${sec.id}-${m.key}`);
    const row = document.getElementById(`row-${sec.id}-${m.key}`);
    if (input) { input.value = ''; input.classList.remove('has-value'); }
    if (row) row.classList.remove('filled');
  });
  updateProgress();
  guardarEstado();
  showToast(`✓ ${sec.nombre} limpiada`);
}

// ──────────────────────────────────────────────
//  EXPORT EXCEL
// ──────────────────────────────────────────────
function exportarExcel() {
  const wb = XLSX.utils.book_new();

  // Sheet 1: Por bodega
  const wsData = [["INVENTARIO FÍSICO GCG — 10 DE MAYO 2026"]];
  wsData.push([]);

  SECTIONS.forEach(sec => {
    wsData.push([]);
    wsData.push([sec.icono + " " + sec.nombre.toUpperCase()]);
    wsData.push(["CODIGO SAP", "PRODUCTO", "CANTIDAD FÍSICA", "UDM", "TIPO"]);
    let hasRows = false;
    sec.items.forEach((item, ri) => {
      const qty = quantities[sec.id][ri];
      const qtyVal = (qty !== undefined && qty !== '') ? parseFloat(qty) : '';
      wsData.push([item[0], item[1], qtyVal, item[2], "Lista"]);
      hasRows = true;
    });
    manualItems[sec.id].forEach(m => {
      const qty = quantities[sec.id][m.key];
      const qtyVal = (qty !== undefined && qty !== '') ? parseFloat(qty) : '';
      wsData.push([m.codigo, m.producto, qtyVal, m.udm, "Manual"]);
      hasRows = true;
    });
    if (!hasRows) wsData.push(["", "(Sin artículos)", "", "", ""]);
  });

  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:15},{wch:45},{wch:18},{wch:8},{wch:10}];
  XLSX.utils.book_append_sheet(wb, ws, "INVENTARIO FISICO");

  // Sheet 2: Consolidado
  const consData = buildConsolidadoData();
  const wsConsRows = [["CODIGO SAP", "PRODUCTO", "TOTAL", "UDM", "BODEGAS DETALLE"]];
  consData.forEach(d => {
    const detalle = d.bodegas.map(b => `${b.nombre}: ${b.qty}`).join(' | ');
    wsConsRows.push([d.codigo, d.producto, d.total, d.udm, detalle]);
  });
  const wsCons = XLSX.utils.aoa_to_sheet(wsConsRows);
  wsCons['!cols'] = [{wch:15},{wch:45},{wch:12},{wch:8},{wch:60}];
  XLSX.utils.book_append_sheet(wb, wsCons, "CONSOLIDADO");

  const ts = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `INVENTARIO_GCG_${ts}.xlsx`);
  showToast('✓ Excel generado con 2 hojas');
}

function exportarExcelConsolidado() {
  const wb = XLSX.utils.book_new();
  const data = buildConsolidadoData();
  const rows = [["CODIGO SAP", "PRODUCTO", "TOTAL", "UDM", "BODEGAS DETALLE"]];
  data.forEach(d => {
    const detalle = d.bodegas.map(b => `${b.nombre}: ${b.qty}`).join(' | ');
    rows.push([d.codigo, d.producto, d.total, d.udm, detalle]);
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:15},{wch:45},{wch:12},{wch:8},{wch:60}];
  XLSX.utils.book_append_sheet(wb, ws, "CONSOLIDADO");
  XLSX.writeFile(wb, `CONSOLIDADO_GCG_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('✓ Consolidado exportado');
}

// ──────────────────────────────────────────────
//  TOAST
// ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.onload = init;
</script>
